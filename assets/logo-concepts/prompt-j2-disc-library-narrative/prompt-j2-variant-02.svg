<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="600" viewBox="0 0 2400 600" role="img" aria-labelledby="title desc">
  <title id="title">MusicRipper disc to library narrative banner J2 variant 02</title>
  <desc id="desc">Airier left-to-right MusicRipper banner using the exact Prompt D audiophile disc mark, flowing tan lines, file rows, wordmark, and tagline.</desc>
  <metadata><![CDATA[{"prompt":"J2","variant":"02","format":"disc-library-narrative-banner","width":2400,"height":600,"transparentBackground":true,"discSource":"prompt-d-variant-01 exact geometry/colors","text":"MusicRipper","tagline":"Audio CD to FLAC, the careful way","fontStack":"Segoe UI, Inter, Manrope, Arial, sans-serif","palette":{"wordmark":"#22272E","tagline":"#626D78","charcoal":"#202326","charcoal2":"#111417","cream":"#F4E8D0","creamLine":"#CDBF9F","deepRed":"#8E1F26","cyan":"#66D9E8","violet":"#8F6AE8","amber":"#E9B44C"}}]]></metadata>
