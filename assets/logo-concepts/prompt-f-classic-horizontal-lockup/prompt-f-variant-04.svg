  <metadata><![CDATA[{"prompt":"F","variant":"04","format":"horizontal-lockup","width":2400,"height":600,"transparentBackground":true,"text":"MusicRipper","tagline":"Audio CDs → AccurateRip-verified FLAC","fontStack":"Segoe UI, Inter, Manrope, Arial, sans-serif","palette":{"disc":"#1B1B1F","groove":"#38383E","wordmark":"#22272E","tagline":"#5E6974","cream":"#F2EAD3","tan":"#B9A985","crimson":"#9A1B1B","cyan":"#7AC9E0","lavender":"#A98BD6","amber":"#E8B673"}}]]></metadata>
