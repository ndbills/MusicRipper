  <title id="title">MusicRipper classic horizontal lockup variant 03</title>
  <desc id="desc">Compact horizontal MusicRipper logo with audiophile disc mark and smaller tagline for README use.</desc>
  <metadata><![CDATA[{"prompt":"F","variant":"03","format":"horizontal-lockup","width":2400,"height":600,"transparentBackground":true,"text":"MusicRipper","tagline":"Audio CDs → AccurateRip-verified FLAC","fontStack":"Segoe UI, Inter, Manrope, Arial, sans-serif","palette":{"disc":"#1B1B1F","groove":"#38383E","wordmark":"#22272E","tagline":"#626D78","cream":"#F2EAD3","tan":"#B9A985","crimson":"#9A1B1B","cyan":"#7AC9E0","lavender":"#A98BD6","amber":"#E8B673"}}]]></metadata>
