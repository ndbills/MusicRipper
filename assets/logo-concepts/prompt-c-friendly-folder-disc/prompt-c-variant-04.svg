  <title id="title">Prompt C friendly folder disc icon variant 04</title>
  <desc id="desc">A small-size optimized friendly compact disc on a mustard folder with a smile-like highlight; no text.</desc>
  <metadata><![CDATA[{"prompt":"C","variant":"04","format":"icon","width":1024,"height":1024,"transparentOutsideRoundedSquare":true,"text":"none","palette":{"cream":"#F7E8CF","cream2":"#EFD9B7","dustyTeal":"#5A9EA2","deepTeal":"#2B666D","mustard":"#D8A13A","folderShadow":"#A5742A","smile":"#FFF3D7"}}]]></metadata>
  <defs>
