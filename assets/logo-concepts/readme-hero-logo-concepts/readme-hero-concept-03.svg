<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="600" viewBox="0 0 2400 600" role="img" aria-labelledby="title desc">
  <title id="title">MusicRipper README hero concept 03</title>
  <desc id="desc">Parent-friendly MusicRipper banner with exact app-logo disc, a simple cream shortcut tile, and a strong wordmark/tagline stack.</desc>
  <metadata><![CDATA[{"set":"readme-hero-logo-concepts","concept":"03","name":"parent-friendly-shortcut-banner","width":2400,"height":600,"transparentBackground":true,"discSource":"prompt-d-variant-01 exact geometry/colors","text":"MusicRipper","tagline":"Insert a CD. Click Rip. Get a clean FLAC album.","fontStack":"Segoe UI, Inter, Manrope, Arial, sans-serif","palette":{"wordmark":"#22272E","tagline":"#596571","cream":"#F4E8D0","creamLine":"#CDBF9F","deepRed":"#8E1F26","cyan":"#66D9E8","violet":"#8F6AE8","amber":"#E9B44C"}}]]></metadata>
  <defs>
    <radialGradient id="disc" cx="45%" cy="36%" r="66%">
      <stop offset="0" stop-color="#33383C"/>
      <stop offset="0.58" stop-color="#202326"/>
      <stop offset="1" stop-color="#111417"/>
    </radialGradient>
    <linearGradient id="rainbow" x1="168" y1="268" x2="842" y2="764" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#66D9E8"/>
      <stop offset="0.45" stop-color="#8F6AE8"/>
      <stop offset="1" stop-color="#E9B44C"/>
    </linearGradient>
    <filter id="softShadow" x="-14%" y="-14%" width="128%" height="132%" color-interpolation-filters="sRGB">
      <feOffset in="SourceAlpha" dx="0" dy="26" result="offset"/>
      <feGaussianBlur in="offset" stdDeviation="24" result="blur"/>
      <feFlood flood-color="#050607" flood-opacity="0.26" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="tileShadow" x="-12%" y="-20%" width="124%" height="150%" color-interpolation-filters="sRGB">
      <feOffset in="SourceAlpha" dx="0" dy="14" result="offset"/>
      <feGaussianBlur in="offset" stdDeviation="15" result="blur"/>
      <feFlood flood-color="#050607" flood-opacity="0.14" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g transform="translate(114.12 74.12) scale(0.44)">
