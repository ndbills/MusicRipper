      <circle cx="512" cy="512" r="356" fill="url(#disc)"/>
      <circle cx="512" cy="512" r="292" fill="none" stroke="#474B50" stroke-width="10" opacity="0.38"/>
      <circle cx="512" cy="512" r="236" fill="none" stroke="#0A0C0E" stroke-width="12" opacity="0.40"/>
      <circle cx="512" cy="512" r="184" fill="none" stroke="#45494D" stroke-width="8" opacity="0.34"/>
      <circle cx="512" cy="512" r="150" fill="#F4E8D0"/>
      <circle cx="512" cy="512" r="108" fill="none" stroke="#CDBF9F" stroke-width="8" opacity="0.88"/>
      <circle cx="512" cy="512" r="74" fill="none" stroke="#CDBF9F" stroke-width="6" opacity="0.82"/>
      <circle cx="512" cy="512" r="44" fill="none" stroke="#CDBF9F" stroke-width="5" opacity="0.78"/>
      <circle cx="512" cy="512" r="22" fill="#8E1F26"/>
