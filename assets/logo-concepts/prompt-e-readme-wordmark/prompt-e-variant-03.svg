  <metadata><![CDATA[{"prompt":"E","variant":"03","format":"wordmark","width":2400,"height":600,"transparentBackground":true,"text":"MusicRipper","fontStack":"Segoe UI, Inter, Manrope, Arial, sans-serif","palette":{"darkSlate":"#2A3946","deepTeal":"#1F6F7A","slate":"#40515F","cream":"#F7EFE0","warmAmber":"#F2B441","folder":"#D9A43C","folderShadow":"#A9772D"}}]]></metadata>
