  <title id="title">Prompt A app icon variant 03</title>
  <desc id="desc">Centered compact disc with extracted rows stepping downward from the lower edge; transparent canvas corners.</desc>
  <metadata><![CDATA[{"prompt":"A","variant":"03","format":"icon","width":1024,"height":1024,"transparentCorners":true,"text":"none","palette":{"deepTeal":"#1F6F7A","slate":"#2B3948","warmAmber":"#F2B441","discWhite":"#F7FAFC","discLine":"#BED2D8"}}]]></metadata>
