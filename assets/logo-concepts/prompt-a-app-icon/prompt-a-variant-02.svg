<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Prompt A app icon variant 02</title>
  <desc id="desc">Minimal compact disc with a stronger three-quarter tilt and three extracted file rows; transparent canvas corners.</desc>
  <metadata><![CDATA[{"prompt":"A","variant":"02","format":"icon","width":1024,"height":1024,"transparentCorners":true,"text":"none","palette":{"deepTeal":"#1F6F7A","slate":"#223444","warmAmber":"#F2B441","discWhite":"#F8FBFC","discLine":"#BDD3D9"}}]]></metadata>
  <defs>
    <linearGradient id="bgGradient" x1="136" y1="160" x2="878" y2="852" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#247A84"/>
      <stop offset="0.58" stop-color="#1F6F7A"/>
      <stop offset="1" stop-color="#223444"/>
    </linearGradient>
    <radialGradient id="discGradient" cx="40%" cy="30%" r="72%">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.50" stop-color="#ECF4F5"/>
      <stop offset="1" stop-color="#B7CCD3"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="146%" color-interpolation-filters="sRGB">
      <feOffset in="SourceAlpha" dx="0" dy="28" result="offset"/>
      <feGaussianBlur in="offset" stdDeviation="26" result="blur"/>
      <feFlood flood-color="#07131A" flood-opacity="0.32" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="lineShadow" x="-12%" y="-42%" width="124%" height="184%" color-interpolation-filters="sRGB">
      <feOffset in="SourceAlpha" dx="0" dy="10" result="offset"/>
      <feGaussianBlur in="offset" stdDeviation="9" result="blur"/>
      <feFlood flood-color="#07131A" flood-opacity="0.24" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect x="96" y="96" width="832" height="832" rx="188" fill="url(#bgGradient)"/>
  <g filter="url(#softShadow)">
